name: Release

on:
  push:
    tags: ["v*"]

# contents: write → create the GitHub Release + upload the .mcpb asset.
# id-token: write → npm provenance attestation via Trusted Publishing (OIDC).
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Health-check upstream APIs (gate)
        run: npm run check:api
      - run: npm run build
      - run: npm test
      - name: Pack .mcpb bundle
        run: npx mcpb pack . steam-games-mcp.mcpb
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: steam-games-mcp.mcpb
          generate_release_notes: true
      # Trusted Publishing (OIDC): no token. Requires npm >= 11.5.1 and a
      # trusted publisher configured for this package on npmjs.com.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest
      - name: Publish to npm (trusted publishing + provenance)
        run: npm publish --provenance --access public

      # Publish to the official MCP Registry (registry.modelcontextprotocol.io).
      # Runs after npm publish so the npm package (with its mcpName marker) is
      # live for the registry's ownership check. The mcpb entry's fileSha256 is
      # injected from the just-packed bundle so it always matches the release
      # asset (zip mtimes make .mcpb non-reproducible, so a committed hash drifts).
      - name: Inject .mcpb SHA-256 into server.json
        run: |
          SHA=$(sha256sum steam-games-mcp.mcpb | cut -d' ' -f1)
          jq --arg sha "$SHA" \
            '(.packages[] | select(.registryType=="mcpb")).fileSha256 = $sha' \
            server.json > server.json.tmp && mv server.json.tmp server.json
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
